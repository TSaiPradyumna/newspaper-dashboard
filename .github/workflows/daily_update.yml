name: Daily Newspaper Scraper

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scaper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Add all files (including the newly generated html)
          git add .
          
          # Only commit if there are changes (prevents exit code 1)
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Daily Newspaper Dashboard" && git push)
